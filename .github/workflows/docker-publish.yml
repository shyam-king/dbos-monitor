name: Docker Publish

on:
  push:
    tags: ["*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v1.2.3)"
        required: true

jobs:
  build-and-push:
    # Skip tag deletions (they also arrive as push events with deleted=true).
    if: github.event.deleted != true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dbos-monitor:${{ steps.release.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/dbos-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
